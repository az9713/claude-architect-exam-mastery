<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain 5 Quiz – Context Management & Reliability</title>
<style>
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #16213e; --border: #2a2a4a;
    --accent: #7c3aed; --accent2: #6d28d9;
    --text: #e2e8f0; --text-muted: #94a3b8;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    --easy: #10b981; --medium: #f59e0b; --hard: #ef4444;
  }
  .light { --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9; --border: #e2e8f0; --text: #1e293b; --text-muted: #64748b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; font-weight: 700; }
  header .meta { font-size: 0.8rem; color: var(--text-muted); }
  .theme-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.8rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.85rem; }
  .score-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
  .score-item .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .score-item .lbl { font-size: 0.75rem; color: var(--text-muted); }
  .progress-wrap { flex: 1; min-width: 200px; }
  .progress-track { background: var(--border); border-radius: 999px; height: 8px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, var(--accent2), var(--accent)); height: 100%; border-radius: 999px; transition: width 0.4s; }
  .progress-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem; }
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; transition: border-color 0.3s; }
  .question-card.answered-correct { border-color: var(--green); }
  .question-card.answered-wrong { border-color: var(--red); }
  .q-header { display: flex; gap: 0.75rem; align-items: flex-start; margin-bottom: 1rem; }
  .q-num { background: var(--accent); color: white; font-weight: 700; font-size: 0.8rem; padding: 0.2rem 0.5rem; border-radius: 0.3rem; white-space: nowrap; }
  .q-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
  .tag.easy { border-color: var(--easy); color: var(--easy); }
  .tag.medium { border-color: var(--medium); color: var(--medium); }
  .tag.hard { border-color: var(--hard); color: var(--hard); }
  .q-text { font-size: 1rem; line-height: 1.6; margin-bottom: 1.25rem; font-weight: 500; }
  .options { display: flex; flex-direction: column; gap: 0.6rem; }
  .option { background: var(--surface2); border: 2px solid var(--border); border-radius: 0.5rem; padding: 0.85rem 1rem; cursor: pointer; display: flex; gap: 0.75rem; align-items: flex-start; transition: all 0.2s; font-size: 0.92rem; line-height: 1.5; }
  .option:hover:not(.disabled) { border-color: var(--accent2); }
  .option.selected { border-color: var(--accent); background: rgba(124, 58, 237, 0.08); }
  .option.correct { border-color: var(--green); background: rgba(16, 185, 129, 0.08); }
  .option.wrong { border-color: var(--red); background: rgba(239, 68, 68, 0.08); }
  .option.disabled { cursor: default; }
  .opt-letter { font-weight: 700; min-width: 1.5rem; color: var(--text-muted); }
  .option.correct .opt-letter { color: var(--green); }
  .option.wrong .opt-letter { color: var(--red); }
  .q-actions { margin-top: 1rem; }
  .btn-submit { background: var(--accent); color: white; padding: 0.5rem 1.2rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }
  .explanation { margin-top: 1rem; background: var(--surface2); border-radius: 0.5rem; overflow: hidden; }
  .expl-toggle { padding: 0.6rem 1rem; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; }
  .expl-body { padding: 0 1rem 1rem; display: none; }
  .expl-body.open { display: block; }
  .expl-body p { font-size: 0.88rem; line-height: 1.6; margin-top: 0.75rem; color: var(--text-muted); }
  .expl-body .correct-note { color: var(--green); font-weight: 600; }
  .expl-option { margin-top: 0.6rem; padding: 0.5rem; background: var(--surface); border-radius: 0.4rem; }
  .expl-option .expl-opt-lbl { font-weight: 700; font-size: 0.8rem; margin-bottom: 0.2rem; }
  .expl-option .expl-opt-lbl.c { color: var(--green); }
  .expl-option .expl-opt-lbl.w { color: var(--red); }
  .expl-option p { margin-top: 0; font-size: 0.83rem; }
  .summary { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 2rem; text-align: center; }
  .summary.show { display: block; }
  .summary .big-score { font-size: 4rem; font-weight: 800; color: var(--accent); }
  .summary .breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
  .breakdown-item { background: var(--surface2); border-radius: 0.5rem; padding: 1rem; }
  .breakdown-item .val { font-size: 1.5rem; font-weight: 700; }
  .breakdown-item .lbl { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
  .btn-retry { background: var(--accent); color: white; padding: 0.75rem 2rem; font-size: 1rem; border-radius: 0.5rem; border: none; cursor: pointer; margin-top: 1rem; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Domain 5: Context Management & Reliability</h1>
    <div class="meta">Claude Certified Architect – Foundations &nbsp;|&nbsp; 15% of exam</div>
  </div>
  <button class="theme-btn" onclick="toggleTheme()">Toggle Theme</button>
</header>
<div class="score-bar">
  <div class="score-item"><div class="val" id="score-val">0</div><div class="lbl">Score</div></div>
  <div class="score-item"><div class="val" id="pct-val">0%</div><div class="lbl">Accuracy</div></div>
  <div class="score-item"><div class="val" id="ans-val">0/10</div><div class="lbl">Answered</div></div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label">0 of 10 questions answered</div>
  </div>
</div>
<main id="main-quiz"></main>
<div class="summary" id="summary">
  <h2>Quiz Complete!</h2>
  <div class="big-score" id="sum-score"></div>
  <div style="color:var(--text-muted);margin-top:0.5rem">out of 10 questions</div>
  <div class="breakdown" id="sum-breakdown"></div>
  <button class="btn-retry" onclick="retryQuiz()">Shuffle & Retry</button>
</div>

<script>
const QUESTIONS = [
  {
    id: 1, ts: "5.1", difficulty: "Medium",
    text: "A customer support agent handles multi-issue sessions. You notice that after 10+ turns, the agent sometimes omits one of the customer's original issues entirely. What is the most likely cause and fix?",
    options: [
      { letter: "A", text: "The agent is running out of context window. Reduce the system prompt length" },
      { letter: "B", text: "The 'lost in the middle' effect: issues in the middle of long contexts receive less attention. Extract issue data into a persistent structured block included in each prompt" },
      { letter: "C", text: "Progressive summarization is dropping issues. Add explicit instructions to never summarize customer issues" },
      { letter: "D", text: "The model has a bug with multi-issue conversations. Switch to a more capable model" }
    ],
    correct: "B",
    explanation: {
      main: "The 'lost in the middle' effect causes models to give less attention to information in the middle of long contexts. Extracting issues into a persistent structured block ensures they're always present and prominently positioned.",
      options: {
        A: { correct: false, text: "Context window exhaustion would cause errors or truncation, not selective omission. And reducing the system prompt doesn't help preserve customer issue data." },
        B: { correct: true, text: "The lost-in-the-middle effect is the canonical explanation for this pattern. Extracting order IDs, amounts, and issue descriptions into a 'case facts' block that appears in every prompt ensures they remain salient throughout the conversation." },
        C: { correct: false, text: "Progressive summarization can lose details, but the symptom (entire issue omission) is more consistent with position effects. Both are real risks, but the fix in B addresses both." },
        D: { correct: false, text: "This isn't a model bug — it's a well-documented behavior of all LLMs. The solution is architectural, not a model switch." }
      }
    }
  },
  {
    id: 2, ts: "5.1", difficulty: "Hard",
    text: "Your order lookup tool returns 40+ fields per order (shipping address, all line items, payment history, etc.) but only 5-6 fields are relevant to support interactions. After 8-10 lookups, context usage is excessive and the model starts ignoring early conversation context. What is the most targeted fix?",
    options: [
      { letter: "A", text: "Compress the conversation history every 5 turns to reduce token usage" },
      { letter: "B", text: "Trim verbose tool outputs to only return the fields relevant to support interactions before they accumulate in context" },
      { letter: "C", text: "Switch to a model with a larger context window" },
      { letter: "D", text: "Limit the agent to a maximum of 5 order lookups per conversation" }
    ],
    correct: "B",
    explanation: {
      main: "Tool results accumulate in context and consume tokens disproportionately to their relevance. Trimming verbose tool outputs at the source is the most targeted and efficient fix.",
      options: {
        A: { correct: false, text: "Compressing conversation history risks losing important details. The root problem is excessive token usage from tool outputs, not conversation history." },
        B: { correct: true, text: "Filtering tool outputs to only relevant fields (e.g., return_eligible, order_status, order_total, customer_id) before they enter context dramatically reduces token consumption while preserving all necessary information." },
        C: { correct: false, text: "A larger context window delays the problem but doesn't fix it. You'll hit the new limit with the same pattern." },
        D: { correct: false, text: "Limiting lookups may cause the agent to miss critical information. The problem is output size, not lookup frequency." }
      }
    }
  },
  {
    id: 3, ts: "5.2", difficulty: "Easy",
    text: "A customer says: 'I'm frustrated and I just want to talk to a human agent.' Your escalation logic only escalates if the issue is classified as 'complex.' What should the agent do?",
    options: [
      { letter: "A", text: "Assess the issue complexity first — if it's simple, resolve it autonomously and explain the decision to the customer" },
      { letter: "B", text: "Escalate to a human agent immediately, honoring the explicit customer request" },
      { letter: "C", text: "Detect the frustration sentiment and escalate on that basis" },
      { letter: "D", text: "Offer to resolve the issue first and only escalate if the customer repeats the request" }
    ],
    correct: "B",
    explanation: {
      main: "Explicit customer requests for a human agent must be honored immediately, regardless of issue complexity. This is a non-negotiable escalation trigger.",
      options: {
        A: { correct: false, text: "Overriding an explicit human escalation request by assessing issue complexity is a customer experience failure. The customer has clearly communicated their preference." },
        B: { correct: true, text: "Explicit customer requests for human agents are the clearest possible escalation trigger. The agent should escalate immediately without first attempting to resolve or assess complexity." },
        C: { correct: false, text: "Sentiment-based escalation is unreliable as a standalone trigger, but in this case the customer has explicitly requested a human — that's a direct request, not just a sentiment signal." },
        D: { correct: false, text: "Requiring a repeated request forces the customer to ask twice after already expressing their preference clearly. This is frustrating and violates the principle of honoring explicit requests." }
      }
    }
  },
  {
    id: 4, ts: "5.2", difficulty: "Medium",
    text: "Your support agent achieves 55% first-contact resolution, far below the 80% target. Logs show it escalates straightforward damage replacements while attempting to handle complex policy exceptions autonomously. Your current system prompt says 'escalate when you feel unsure.' What is the most effective improvement?",
    options: [
      { letter: "A", text: "Replace 'escalate when you feel unsure' with confidence scoring: 'if confidence < 7/10, escalate'" },
      { letter: "B", text: "Add a sentiment analysis layer that escalates when customer negativity exceeds a threshold" },
      { letter: "C", text: "Add explicit escalation criteria with few-shot examples demonstrating when to escalate vs. resolve" },
      { letter: "D", text: "Implement a classifier trained on historical tickets to predict escalation need before the agent processes each request" }
    ],
    correct: "C",
    explanation: {
      main: "Vague guidance ('feel unsure') produces the observed miscalibration. Explicit criteria with few-shot examples define the boundary precisely, enabling correct escalation decisions.",
      options: {
        A: { correct: false, text: "Self-reported confidence is poorly calibrated — the agent may be incorrectly confident about complex cases it shouldn't handle. Confidence scores don't fix the underlying unclear boundaries." },
        B: { correct: false, text: "Sentiment doesn't correlate with case complexity, which is the actual issue. A frustrated customer with a simple problem and a calm customer with a complex exception require opposite escalation decisions." },
        C: { correct: true, text: "Explicit criteria (escalate: policy gaps, fraud suspicion, customer explicitly requests human; resolve: standard damage replacement with photo evidence, typical refund within policy) plus few-shot examples directly calibrate the decision boundary." },
        D: { correct: false, text: "A classifier requires labeled training data and ML infrastructure. Prompt optimization should be tried first — it's simpler, faster, and often equally effective." }
      }
    }
  },
  {
    id: 5, ts: "5.3", difficulty: "Medium",
    text: "Your web search subagent encounters a timeout and returns an empty results array to the coordinator, marked as successful. What problem does this create?",
    options: [
      { letter: "A", text: "The coordinator will retry the query unnecessarily, wasting resources" },
      { letter: "B", text: "The coordinator cannot distinguish the access failure from a valid empty search result and may proceed with incomplete information while believing the search succeeded" },
      { letter: "C", text: "The coordinator will try to use the empty results for synthesis, which will cause an error" },
      { letter: "D", text: "The customer will receive an error message because no results were found" }
    ],
    correct: "B",
    explanation: {
      main: "Silently converting failures to empty success results prevents the coordinator from making appropriate recovery decisions. It cannot distinguish 'no results found' (expected) from 'search failed' (needs recovery).",
      options: {
        A: { correct: false, text: "If the result is marked successful, the coordinator has no reason to retry. The opposite problem occurs — it won't retry when it should." },
        B: { correct: true, text: "This is the core problem: the coordinator believes the search worked but found nothing, when actually the search failed entirely. It may then proceed to synthesis with a critical gap in sources, producing incomplete or misleading output." },
        C: { correct: false, text: "Empty results don't typically cause errors — they're a valid (if undesirable) input to synthesis. The issue is hidden failure, not surface-level errors." },
        D: { correct: false, text: "The coordinator doesn't automatically surface internal errors to customers. The problem is internal system reliability, not customer-facing error messages." }
      }
    }
  },
  {
    id: 6, ts: "5.3", difficulty: "Hard",
    text: "A subagent's database query times out after 30 seconds. It has retrieved 60% of the needed records before the timeout. What is the best error propagation approach?",
    options: [
      { letter: "A", text: "Return an empty array and error: true — the partial results are unreliable" },
      { letter: "B", text: "Return the partial results as if complete — any data is better than none" },
      { letter: "C", text: "Propagate the full exception to terminate the workflow immediately" },
      { letter: "D", text: "Return structured context including the failure type (timeout), what was attempted, partial results with coverage annotation, and suggested alternatives" }
    ],
    correct: "D",
    explanation: {
      main: "Structured error context with partial results enables intelligent coordinator recovery. The coordinator can use the 60% complete data while deciding how to get the remaining 40%.",
      options: {
        A: { correct: false, text: "Discarding 60% complete data wastes valuable partial results. The coordinator should receive the data with clear annotation about incompleteness." },
        B: { correct: false, text: "Returning partial results without annotation is deceptive. The coordinator believes it has complete data and can't make informed decisions about gaps." },
        C: { correct: false, text: "Terminating the entire workflow on a single timeout is an anti-pattern. Recovery strategies (retry, alternative source, proceed with partial) should be attempted first." },
        D: { correct: true, text: "Structured context including failure_type: 'timeout', records_retrieved: 60%, timestamp_range_covered, and alternatives_available gives the coordinator everything it needs to make an intelligent recovery decision: use partial data now, or retry for completeness." }
      }
    }
  },
  {
    id: 7, ts: "5.4", difficulty: "Medium",
    text: "After an extended codebase exploration session (30+ turns), your agent starts giving inconsistent answers about module dependencies it correctly identified earlier. What is the most effective mitigation?",
    options: [
      { letter: "A", text: "Increase the model's temperature to improve consistency" },
      { letter: "B", text: "Have the agent maintain scratchpad files recording key findings, referencing them for subsequent questions" },
      { letter: "C", text: "Start a fresh session and re-explore the codebase from the beginning" },
      { letter: "D", text: "Use /compact to compress the context window every 10 turns" }
    ],
    correct: "B",
    explanation: {
      main: "Context degradation in extended sessions causes agents to give inconsistent answers as earlier findings drift out of reliable attention range. Scratchpad files persist key findings outside the context window.",
      options: {
        A: { correct: false, text: "Temperature affects output randomness, not context management. Higher temperature would make inconsistency worse, not better." },
        B: { correct: true, text: "Scratchpad files record key findings (module dependency maps, API signatures, architectural patterns) outside the context window. The agent references the file for subsequent questions instead of relying on potentially degraded context memory." },
        C: { correct: false, text: "Starting fresh wastes all the exploration work. Scratchpad files allow continuing from a stable recorded baseline." },
        D: { correct: false, text: "/compact reduces context usage but can itself cause information loss. Scratchpad files are a more reliable persistence mechanism for critical findings." }
      }
    }
  },
  {
    id: 8, ts: "5.4", difficulty: "Hard",
    text: "Your multi-agent codebase analysis system crashes partway through a 4-hour exploration task. You need to design a recovery mechanism that avoids restarting from scratch. What is the correct approach?",
    options: [
      { letter: "A", text: "Save the full conversation context to disk periodically and reload it on resume" },
      { letter: "B", text: "Have each agent export structured state to a known location, with a coordinator manifest that tracks progress. On resume, load the manifest and inject state into agent prompts" },
      { letter: "C", text: "Use database transactions to checkpoint progress at each major milestone" },
      { letter: "D", text: "Implement automatic retry logic that restarts the failed agent from its last successful tool call" }
    ],
    correct: "B",
    explanation: {
      main: "Structured state persistence with a coordinator manifest is the correct crash recovery pattern. Each agent's exported state can be injected into fresh agent prompts, avoiding full re-exploration.",
      options: {
        A: { correct: false, text: "Saving full conversation context is fragile — contexts can be very large, contain stale tool results, and may not be usable across sessions or after crashes." },
        B: { correct: true, text: "Each agent exports structured state (discovered files, dependency maps, open questions) to a known path. The coordinator manifest tracks which agents completed which phases. On resume, the coordinator injects this state into fresh agent prompts, picking up from where things left off." },
        C: { correct: false, text: "Database transactions are valuable for persistent data but don't address agent context recovery. The challenge is reinitializing agent reasoning context, not just data persistence." },
        D: { correct: false, text: "Retrying from the last tool call doesn't help if the agent's accumulated context was lost. The issue is restoring the agent's accumulated understanding of the codebase, not re-executing a single tool." }
      }
    }
  },
  {
    id: 9, ts: "5.5", difficulty: "Medium",
    text: "Your extraction system achieves 97% overall accuracy, so you reduce human review to <1%. Two weeks later, you discover the system has been extracting contract_value incorrectly for a specific document type that makes up 15% of volume. What sampling approach would have caught this earlier?",
    options: [
      { letter: "A", text: "Random sampling of 3% of all extractions for human review" },
      { letter: "B", text: "Stratified random sampling that ensures representation across all document types and confidence tiers" },
      { letter: "C", text: "Reviewing only extractions where the model reported low confidence" },
      { letter: "D", text: "Periodic full re-review of a large batch to check for systematic errors" }
    ],
    correct: "B",
    explanation: {
      main: "Aggregate accuracy metrics mask poor performance on specific document types. Stratified sampling ensures all document types are represented in review, catching segment-specific errors that random sampling might miss.",
      options: {
        A: { correct: false, text: "Random sampling at 3% would likely catch some issues but might miss a specific document type error if that type is underrepresented in the random sample." },
        B: { correct: true, text: "Stratified sampling ensures each document type and confidence tier is proportionally reviewed. This would have flagged the contract_value errors in the 15% document type even if overall accuracy appeared high." },
        C: { correct: false, text: "Low-confidence reviews only catch cases the model knows it's uncertain about. Systematic errors in a document type the model is confidently wrong about would be missed entirely." },
        D: { correct: false, text: "Periodic full re-reviews are costly and infrequent. Ongoing stratified sampling provides earlier warning with lower overhead." }
      }
    }
  },
  {
    id: 10, ts: "5.6", difficulty: "Hard",
    text: "Your multi-agent research system synthesizes findings from 5 different sources. The final report attributes a specific market size figure to 'multiple sources' without identifying which ones. A stakeholder challenges the figure. What structural problem caused this and how should it be fixed?",
    options: [
      { letter: "A", text: "The synthesis agent was given too much information. Reduce the number of sources to 2-3 for clearer attribution" },
      { letter: "B", text: "Source attribution was lost during summarization. Require subagents to output structured claim-source mappings that the synthesis agent preserves" },
      { letter: "C", text: "The synthesis agent needs a larger context window to remember all source attributions" },
      { letter: "D", text: "Add a post-synthesis citation checker that matches claims to sources in the original documents" }
    ],
    correct: "B",
    explanation: {
      main: "Source attribution is lost during summarization when claim-source mappings aren't explicitly preserved. The fix requires structural changes to how subagents format their outputs.",
      options: {
        A: { correct: false, text: "Reducing sources reduces coverage. The problem isn't too many sources — it's that the claim-source relationship wasn't preserved in the data pipeline." },
        B: { correct: true, text: "Requiring subagents to output structured claim-source mappings ({claim: '...', source_url: '...', excerpt: '...'}) that the synthesis agent must preserve ensures attribution survives all the way to the final report. The market size figure would cite its specific sources." },
        C: { correct: false, text: "Context window isn't the limiting factor. The information is being discarded structurally during summarization, not lost due to context limits." },
        D: { correct: false, text: "Post-synthesis citation matching is unreliable — claims may be paraphrased or synthesized across sources, making matching difficult. Preserving attributions through the pipeline is more robust." }
      }
    }
  }
];

let state = { questions: [], answers: {}, revealed: {} };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function init() {
  state.questions = shuffle(QUESTIONS); state.answers = {}; state.revealed = {};
  document.getElementById('summary').classList.remove('show');
  renderQuiz(); updateScore();
}

function renderQuiz() {
  const main = document.getElementById('main-quiz');
  main.innerHTML = '';
  state.questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (state.answers[q.id] ? (state.answers[q.id] === q.correct ? ' answered-correct' : ' answered-wrong') : '');
    card.id = 'q-' + q.id;
    const opts = q.options.map(o => {
      let cls = '';
      if (state.answers[q.id]) { cls = 'disabled'; if (o.letter === q.correct) cls += ' correct'; else if (o.letter === state.answers[q.id]) cls += ' wrong'; }
      return `<div class="option ${cls}" onclick="selectOption(${q.id}, '${o.letter}')"><span class="opt-letter">${o.letter}</span><span>${o.text}</span></div>`;
    }).join('');
    card.innerHTML = `
      <div class="q-header"><span class="q-num">Q${idx + 1}</span><div class="q-tags"><span class="tag ${q.difficulty.toLowerCase()}">${q.difficulty}</span><span class="tag">TS ${q.ts}</span></div></div>
      <div class="q-text">${q.text}</div>
      <div class="options" id="opts-${q.id}">${opts}</div>
      <div class="q-actions"><button class="btn-submit" id="btn-${q.id}" onclick="submitAnswer(${q.id})" ${state.answers[q.id] ? 'style="display:none"' : 'disabled'}>Submit</button></div>
      <div class="explanation" id="expl-${q.id}" ${state.revealed[q.id] ? '' : 'style="display:none"'}>${state.revealed[q.id] ? buildExplanation(q) : ''}</div>`;
    main.appendChild(card);
  });
}

function selectOption(qid, letter) {
  if (state.answers[qid]) return;
  document.querySelectorAll(`#opts-${qid} .option`).forEach(el => el.classList.remove('selected'));
  document.querySelectorAll(`#opts-${qid} .option`).forEach(el => { if (el.querySelector('.opt-letter').textContent === letter) el.classList.add('selected'); });
  document.getElementById('btn-' + qid).disabled = false;
}

function submitAnswer(qid) {
  const q = state.questions.find(q => q.id === qid);
  const selected = document.querySelector(`#opts-${qid} .option.selected`);
  if (!selected) return;
  const letter = selected.querySelector('.opt-letter').textContent;
  state.answers[qid] = letter; state.revealed[qid] = true;
  document.getElementById('q-' + qid).classList.add(letter === q.correct ? 'answered-correct' : 'answered-wrong');
  document.querySelectorAll(`#opts-${qid} .option`).forEach(el => {
    el.classList.add('disabled'); el.classList.remove('selected');
    const l = el.querySelector('.opt-letter').textContent;
    if (l === q.correct) el.classList.add('correct');
    else if (l === letter && l !== q.correct) el.classList.add('wrong');
  });
  document.getElementById('btn-' + qid).style.display = 'none';
  const explEl = document.getElementById('expl-' + qid);
  explEl.style.display = ''; explEl.innerHTML = buildExplanation(q);
  explEl.querySelector('.expl-body').classList.add('open');
  updateScore(); checkComplete();
}

function buildExplanation(q) {
  return `<div class="explanation"><div class="expl-toggle" onclick="toggleExpl(this)"><span>Explanation</span><span>▲</span></div><div class="expl-body open"><p class="correct-note">Correct Answer: ${q.correct}</p><p>${q.explanation.main}</p>${q.options.map(o => `<div class="expl-option"><div class="expl-opt-lbl ${o.letter === q.correct ? 'c' : 'w'}">${o.letter} — ${o.letter === q.correct ? 'CORRECT' : 'INCORRECT'}</div><p>${q.explanation.options[o.letter].text}</p></div>`).join('')}</div></div>`;
}

function toggleExpl(el) {
  const body = el.nextElementSibling;
  el.querySelector('span:last-child').textContent = body.classList.toggle('open') ? '▲' : '▼';
}

function updateScore() {
  const total = state.questions.length;
  const answered = Object.keys(state.answers).length;
  const correct = Object.entries(state.answers).filter(([id, ans]) => { const q = state.questions.find(q => q.id == id); return q && ans === q.correct; }).length;
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  document.getElementById('score-val').textContent = correct;
  document.getElementById('pct-val').textContent = pct + '%';
  document.getElementById('ans-val').textContent = answered + '/' + total;
  document.getElementById('progress-fill').style.width = (answered / total * 100) + '%';
  document.getElementById('progress-label').textContent = answered + ' of ' + total + ' questions answered';
}

function checkComplete() { if (Object.keys(state.answers).length === state.questions.length) setTimeout(showSummary, 500); }

function showSummary() {
  const total = state.questions.length;
  const correct = Object.entries(state.answers).filter(([id, ans]) => { const q = state.questions.find(q => q.id == id); return q && ans === q.correct; }).length;
  const pct = Math.round((correct / total) * 100);
  const byDiff = { Easy: { c: 0, t: 0 }, Medium: { c: 0, t: 0 }, Hard: { c: 0, t: 0 } };
  state.questions.forEach(q => { byDiff[q.difficulty].t++; if (state.answers[q.id] === q.correct) byDiff[q.difficulty].c++; });
  document.getElementById('sum-score').textContent = correct + '/' + total;
  document.getElementById('sum-breakdown').innerHTML = `
    <div class="breakdown-item"><div class="val" style="color:var(--green)">${byDiff.Easy.c}/${byDiff.Easy.t}</div><div class="lbl">Easy</div></div>
    <div class="breakdown-item"><div class="val" style="color:var(--yellow)">${byDiff.Medium.c}/${byDiff.Medium.t}</div><div class="lbl">Medium</div></div>
    <div class="breakdown-item"><div class="val" style="color:var(--red)">${byDiff.Hard.c}/${byDiff.Hard.t}</div><div class="lbl">Hard</div></div>
    <div class="breakdown-item"><div class="val" style="color:var(--accent)">${pct}%</div><div class="lbl">Accuracy</div></div>`;
  document.getElementById('summary').classList.add('show');
  document.getElementById('summary').scrollIntoView({ behavior: 'smooth' });
}

function retryQuiz() { init(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
function toggleTheme() { document.body.classList.toggle('light'); }

init();
</script>
</body>
