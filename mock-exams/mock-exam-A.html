<style>

.domain-bars h3{font-size:1rem;font-weight:700;margin-bottom:16px;color:#1a1a2e}

.domain-name{font-weight:600;color:#1a1a2e}
.domain-pct{font-weight:700}
.bar-bg{background:#f0f2f5;border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.bar-fill.good{background:#388e3c}

.bar-fill.low{background:#c62828}
.scenario-breakdown{margin-top:24px}
.scenario-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2f5;font-size:.9rem}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}

.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.action-btn{padding:12px 24px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#0f3460;color:#fff}
.btn-primary:hover{background:#1a5276;transform:translateY(-1px)}
.btn-secondary{background:#fff;color:#0f3460;border:2px solid #0f3460}
.btn-secondary:hover{background:#f0f4ff}

.btn-danger:hover{background:#c73652}
#retry-mode-banner{background:#fff3cd;border:1px solid #f57c00;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:.88rem;color:#7a4f00;display:none}

<body>

<div id="config-modal" class="show">
  <div class="modal-box">
    <h2>Mock Exam A</h2>
    <p>Scenarios: Customer Support (S1), Code Generation (S2), Multi-Agent Research (S3), CI/CD (S5)<br>50 questions &bull; Calibrated to real exam difficulty</p>
    <div class="modal-field">
      <label>Timer Duration (minutes)</label>
      <input type="number" id="timer-input" value="90" min="10" max="180">
    </div>
    <div class="modal-actions">
      <button class="action-btn btn-primary" onclick="startExam()">Start Exam</button>
    </div>
  </div>
</div>

<div id="exam-ui" style="display:none">
  <div id="exam-header">
    <h1>Mock Exam A &mdash; Claude Certified Architect: Foundations</h1>
    <div id="header-right">
      <span id="progress-text">0 / 50 answered</span>
      <div id="timer-box">90:00</div>
      <button id="submit-btn" onclick="confirmSubmit()">Submit Exam</button>
    </div>
  </div>

  <div id="main-layout">
    <div id="sidebar">
      <div id="sidebar-card">
        <h3>Question Navigator</h3>
        <div id="q-grid"></div>
        <div id="sidebar-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#e3f2fd;border:1px solid #1976d2"></div> Answered</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fff3cd;border:1px solid #f57c00"></div> Flagged</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fff;border:1px solid #ccc"></div> Unanswered</div>
        </div>
      </div>
    </div>
    <div id="content-area"></div>
  </div>
</div>

<div id="results-screen"></div>

<script>
const QUESTIONS = [
  // ===== SCENARIO 1: Customer Support Resolution Agent (Q1-13) =====
  {
    id:1, scenario:1, domain:'D1', taskStatement:'1.4', difficulty:'Medium',
    context:'Your customer support agent (built with the Claude Agent SDK) sometimes processes refunds before completing the mandatory identity verification step. Production logs show that in 8% of cases, process_refund is called without a prior successful get_customer call.',
    stem:'What is the most architecturally sound approach to guarantee the correct tool call order?',
    options:[
      'Add a PostToolUse hook that checks whether get_customer was previously called and cancels process_refund if not',
      'Implement a programmatic prerequisite gate that blocks process_refund from being invoked until get_customer has returned a verified customer ID',
      'Update the system prompt to emphasize that customer verification is always required before processing any refund',
      'Add a PreToolUse hook that logs every tool call sequence and sends an alert when process_refund is called out of order'
    ],
    correct:1,
    explanations:[
      'A PostToolUse hook fires after the tool call, which means the refund has already occurred. This is the wrong hook event for prevention.',
      'CORRECT. A programmatic prerequisite gate is the only approach that provides deterministic enforcement — it makes it architecturally impossible to call process_refund without a verified customer ID, regardless of LLM behavior.',
      'Prompt-based guidance has a non-zero failure rate. Production data (8% failure) already demonstrates that prompt instructions alone are insufficient for this business-critical requirement.',
      'Logging and alerting detects violations after the fact but does not prevent them. This is monitoring, not enforcement.'
    ]
  },
  {
    id:2, scenario:1, domain:'D1', taskStatement:'1.5', difficulty:'Medium',
    context:'Your customer support agent calls multiple MCP backend tools that return dates in different formats: the orders database returns Unix timestamps (1711929600), the billing system returns ISO 8601 strings ("2024-04-01T00:00:00Z"), and the CRM returns human-readable strings ("April 1, 2024"). The agent frequently confuses these and makes incorrect date comparisons.',
    stem:'Which hook pattern is best suited to normalize these date formats before the agent processes them?',
    options:[
      'A PreToolUse hook that intercepts each tool call and standardizes the request parameters before they are sent',
      'A PostToolUse hook that intercepts tool results and converts all date formats to a single canonical format before the agent processes them',
      'Update each MCP tool description to document the date format it returns, so the agent knows how to interpret each one',
      'Add a date normalization system prompt instruction telling the agent how to convert between formats'
    ],
    correct:1,
    explanations:[
      'A PreToolUse hook fires before the tool executes and can inspect/modify the call parameters. However, date format normalization is about processing the output (result), not the input.',
      'CORRECT. A PostToolUse hook fires after the tool returns results. It can intercept the raw tool result and transform date formats to a single canonical representation before the model processes them — this is the documented pattern for data normalization.',
      'Documenting formats helps the agent understand, but relies on the model to correctly parse and compare heterogeneous formats in its reasoning — which is exactly what is failing.',
      'Asking the agent to internally convert formats is probabilistic and adds cognitive load. The hook approach handles this deterministically at the infrastructure level.'
    ]
  },
  {
    id:3, scenario:1, domain:'D2', taskStatement:'2.2', difficulty:'Hard',
    context:'Your customer support agent calls process_refund and occasionally receives a failure. The current error response is simply: {"error": "Operation failed"}. When this occurs, the agent apologizes to the customer and says it cannot process the refund, even when the failure was a transient network timeout that could be safely retried.',
    stem:'What structured error response design would best enable the agent to make appropriate recovery decisions?',
    options:[
      'Return HTTP status codes (503 for transient, 400 for validation, 403 for permission) and let the agent infer the recovery action from the code',
      'Return an error object with errorCategory (transient/validation/permission/business), isRetryable boolean, and a human-readable description',
      'Return a verbose error log with full stack trace and database error codes so the agent has maximum diagnostic information',
      'Catch all errors in the MCP server and convert them to success responses with an "error_note" field to avoid raising exceptions'
    ],
    correct:1,
    explanations:[
      'HTTP status codes were not designed for agent decision-making. Agents cannot reliably infer nuanced recovery decisions from numeric codes, and the MCP protocol uses its own error signaling (isError flag) rather than HTTP semantics.',
      'CORRECT. This is the documented MCP error pattern. errorCategory tells the agent what kind of failure occurred, isRetryable tells it whether to attempt a retry, and the human-readable description allows the agent to communicate appropriately with the customer.',
      'Stack traces and database error codes are debugging information for developers, not decision-making context for agents. Exposing internal error details also raises security concerns.',
      'Converting errors to success responses makes the agent believe the operation succeeded. The agent cannot make recovery decisions if it does not know an error occurred.'
    ]
  },
  {
    id:4, scenario:1, domain:'D5', taskStatement:'5.1', difficulty:'Medium',
    context:'Your customer support agent handles complex multi-issue cases. During a long conversation about a return, billing dispute, and account access issue, the agent correctly identifies all three problems early in the conversation. However, by the time it synthesizes a resolution, it has lost track of the specific amounts mentioned and provides vague responses like "we will process a refund for the relevant amount."',
    stem:'What context management technique best preserves transactional precision across a long support session?',
    options:[
      'Summarize the conversation every 5 turns to keep the context window manageable, compressing older content',
      'Extract transactional facts (amounts, order numbers, dates, statuses) into a persistent "case facts" block that is included verbatim in each subsequent prompt outside the summarized history',
      'Use progressive summarization to compress the conversation, ensuring dates and amounts are mentioned in the summary',
      'Instruct the agent in the system prompt to always re-read the earliest messages before giving a final answer'
    ],
    correct:1,
    explanations:[
      'Summarization risks compressing or losing specific numerical values and stated expectations. The exam guide explicitly identifies this as a progressive summarization risk.',
      'CORRECT. Extracting transactional facts into a persistent structured block that lives outside the summarized history ensures critical specifics (exact amounts, order IDs, dates) are always in context. This is the recommended pattern for customer support agents.',
      'Progressive summarization, even when done carefully, risks losing precision. The problem statement says amounts are lost during compression — summarization does not solve the root cause.',
      'Instructing the agent to re-read earlier messages relies on model compliance and does not guarantee the information is still in context if the conversation has been truncated.'
    ]
  },
  {
    id:5, scenario:1, domain:'D5', taskStatement:'5.2', difficulty:'Easy',
    context:'A customer messages: "I am furious! I have been waiting 3 weeks for my replacement and nobody helps me. I DEMAND to speak with a human right now." Your agent is configured with a 70% confidence threshold for escalation. The confidence scoring suggests the agent can resolve the replacement — it is a standard case fully within policy.',
    stem:'What is the correct escalation behavior?',
    options:[
      'Assess whether the replacement case is within standard policy; if so, resolve it autonomously since the agent is capable',
      'Acknowledge the customer\'s frustration, offer to resolve the replacement immediately, and escalate only if the customer reiterates their demand for a human',
      'Honor the explicit request for a human agent immediately without first attempting to investigate or offer a resolution',
      'Escalate based on the negative sentiment detected, triggering the escalation workflow'
    ],
    correct:2,
    explanations:[
      'Even if the case is technically resolvable, overriding an explicit customer request for human assistance violates the customer\'s stated preference and erodes trust.',
      'This is the correct approach for frustrated customers who have not explicitly demanded a human — acknowledge frustration and offer resolution. However, this customer explicitly demanded human assistance, making option C the correct response.',
      'CORRECT. When a customer explicitly requests a human agent, the correct behavior is immediate escalation without first attempting to investigate or resolve. Explicit human requests must be honored immediately per the exam guide\'s escalation protocol.',
      'Sentiment-based escalation is identified as unreliable. The correct trigger here is the explicit verbal demand, not the sentiment score.'
    ]
  },
  {
    id:6, scenario:1, domain:'D1', taskStatement:'1.2', difficulty:'Hard',
    context:'Your customer support agent receives: "My last three orders have all had problems. Order #1001 had wrong items, #1002 arrived damaged, and #1003 never showed up. I need all three resolved today." The agent calls lookup_order(#1001), reads the result, then calls lookup_order(#1002), then lookup_order(#1003) — three sequential round-trips to the coordinator.',
    stem:'What orchestration improvement would most reduce latency for multi-issue requests?',
    options:[
      'Have the coordinator batch all three lookup_order calls into a single API request using the Message Batches API',
      'Instruct the agent to accumulate all required information before making any tool calls, then call all three lookup_order tools in a single coordinator response to enable parallel execution',
      'Create a lookup_multiple_orders tool that accepts a list of order IDs and returns all results in a single call',
      'Have the coordinator spawn three separate subagents, one for each order, and run them sequentially to manage resource usage'
    ],
    correct:1,
    explanations:[
      'The Message Batches API is designed for asynchronous, latency-tolerant workloads. It has up to 24-hour processing time and does not support multi-turn tool use — entirely inappropriate for real-time customer support.',
      'CORRECT. Emitting multiple Task tool calls (or multiple tool calls for parallel tools) in a single coordinator response enables parallel execution. The exam guide explicitly states that parallel subagents are spawned by emitting multiple Task calls in a single response.',
      'Creating a new tool is a valid engineering approach but requires backend changes and is not the recommended first step when the orchestration pattern itself can be improved.',
      'Sequential subagents provide no latency benefit. Parallel subagents would help, but the question says "spawned sequentially" — and even parallel spawning via subagents adds overhead vs. direct parallel tool calls.'
    ]
  },
  {
    id:7, scenario:1, domain:'D2', taskStatement:'2.1', difficulty:'Medium',
    context:'Your agent has two tools: get_customer (description: "Retrieves customer data") and lookup_account (description: "Retrieves account information"). Production logs show the agent calls get_customer for account inquiries and lookup_account for customer profile requests about 30% of the time.',
    stem:'What is the most effective first step to fix this tool selection confusion?',
    options:[
      'Consolidate both tools into a single get_entity tool that accepts any identifier and internally routes to the correct backend',
      'Expand each tool\'s description to include the specific identifier types it accepts, example queries that should trigger it, and explicit boundary conditions explaining when to use it versus the other tool',
      'Add few-shot examples to the system prompt showing 5-10 correct tool selections for representative queries',
      'Implement a pre-processing router that analyzes user input and pre-selects the tool before the main agent processes the request'
    ],
    correct:1,
    explanations:[
      'Consolidation is a valid architectural option but requires more effort and changes the API surface. The exam guide identifies description quality as the root cause for tool confusion — fix the root cause first.',
      'CORRECT. Tool descriptions are the primary mechanism LLMs use for tool selection. Expanding descriptions with specific inputs, example queries, and explicit boundaries directly addresses the root cause of the 30% misrouting rate.',
      'Few-shot examples add value but address symptoms rather than the root cause. The exam guide explicitly states tool descriptions are the primary mechanism — descriptions should be fixed first.',
      'A pre-processing router adds architectural complexity and bypasses the LLM\'s natural language understanding. This is the "over-engineering" trap when a description update would suffice.'
    ]
  },
  {
    id:8, scenario:1, domain:'D1', taskStatement:'1.4', difficulty:'Hard',
    context:'Your customer support agent is escalating a complex billing dispute to a human agent. The human agent has no access to the conversation transcript and must understand the situation from scratch. Currently the agent just says "Escalating to human support" with no additional context.',
    stem:'What should a well-designed escalation handoff include?',
    options:[
      'The full raw conversation transcript, all tool call logs, and all API responses so the human agent has complete information',
      'A structured summary containing: customer ID, verified contact info, root cause analysis, actions attempted, amount in dispute, and recommended next action',
      'A confidence score indicating how difficult the case is, and a list of the tools that were called during the session',
      'A natural language summary of what the customer said, written from the customer\'s perspective'
    ],
    correct:1,
    explanations:[
      'Full conversation transcripts are verbose and time-consuming for human agents to parse. The exam guide specifically calls out that human agents lack access to the transcript and need a structured summary.',
      'CORRECT. The exam guide explicitly describes structured handoff summaries as including: customer ID, root cause analysis, refund amount, and recommended action. This is the documented pattern for escalation to humans who lack context.',
      'Confidence scores and tool call logs are debugging information, not actionable context for human agents. The human needs to understand what happened and what to do, not how confident the AI was.',
      'A customer-perspective narrative lacks the structured factual data (IDs, amounts, root cause) that human agents need to act quickly and accurately.'
    ]
  },
  {
    id:9, scenario:1, domain:'D2', taskStatement:'2.4', difficulty:'Easy',
    context:'Your team is building a customer support agent and has integrated three MCP servers: a CRM system, an orders database, and a payment processor. A new developer clones the repository and reports that the MCP tools are not available in their Claude Code session, even though they are available for all other team members.',

    explanations:[
      'The exam guide explicitly warns against making decisions based solely on aggregate accuracy metrics.',
      'CORRECT. The exam guide states: "the risk that aggregate accuracy metrics may mask poor performance on specific document types or fields." 97% overall may hide 60% accuracy for edge-case PR types. Stratified sampling by PR category and field segment is required before eliminating human review.',
      'This is an overcorrection. Human review is appropriate where error risk justifies the cost. The question is about the validation methodology, not an absolute principle.',
      '99% is an arbitrary threshold with no analytical basis. The correct approach is to validate accuracy by segment, not to wait for a higher overall average.'
    ]
  }
];

const DOMAIN_LABELS = {D1:'D1: Agentic Architecture',D2:'D2: Tool Design & MCP',D3:'D3: Claude Code Config',D4:'D4: Prompt Engineering',D5:'D5: Context & Reliability'};
const SCENARIO_LABELS = {1:'S1: Customer Support',2:'S2: Code Generation',3:'S3: Multi-Agent Research',5:'S5: CI/CD Pipeline'};
const DOMAIN_WEIGHTS = {D1:0.27,D2:0.18,D3:0.20,D4:0.20,D5:0.15};

let timerInterval = null, timeLeft = 90*60, examStarted = false, submitted = false, retryMode = false;
let answers = {}, flagged = new Set(), retrySet = [];

function startExam() {
  const mins = parseInt(document.getElementById('timer-input').value) || 90;
  timeLeft = mins * 60;
  document.getElementById('config-modal').classList.remove('show');
  document.getElementById('exam-ui').style.display = 'block';
  examStarted = true;
  renderQuestions();
  renderNav();
  startTimer();
  scrollToQuestion(1);
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft <= 0) { clearInterval(timerInterval); autoSubmit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft/60), s = timeLeft%60;
  const el = document.getElementById('timer-box');
  el.textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.className = timeLeft <= 300 ? 'danger' : timeLeft <= 900 ? 'warning' : '';
}

function autoSubmit() { submitted = true; showResults(); }

function confirmSubmit() {
  const unanswered = QUESTIONS.length - Object.keys(answers).length;
  const msg = unanswered > 0 ? `You have ${unanswered} unanswered questions. Submit anyway?` : 'Submit exam?';
  if(confirm(msg)) { clearInterval(timerInterval); submitted = true; showResults(); }
}

function renderQuestions() {
  const container = document.getElementById('content-area');
  container.innerHTML = '';
  let currentScenario = null;
  const questionsToShow = retryMode ? QUESTIONS.filter(q => retrySet.includes(q.id)) : QUESTIONS;
  questionsToShow.forEach(q => {
    if(q.scenario !== currentScenario) {
      currentScenario = q.scenario;
      const sh = document.createElement('div');
      sh.className = 'scenario-header';
      sh.innerHTML = `<h2>${SCENARIO_LABELS[q.scenario]}</h2><p>${getScenarioDesc(q.scenario)}</p>`;
      container.appendChild(sh);
    }
    container.appendChild(buildQuestionCard(q));
  });
}

function getScenarioDesc(s) {
  const d = {
    1:'You are building a customer support resolution agent using the Claude Agent SDK. The agent handles returns, billing disputes, and account issues using MCP tools.',
    2:'You are using Claude Code to accelerate software development with custom slash commands, CLAUDE.md configurations, and CI/CD integration.',
    3:'A coordinator agent delegates to specialized subagents: WebSearchAgent, DocumentAnalysisAgent, SynthesisAgent, and ReportGeneratorAgent.',
    5:'You are integrating Claude Code into your CI/CD pipeline for automated code review, test generation, and pull request feedback.'
  };
  return d[s]||'';
}

function buildQuestionCard(q) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-'+q.id;
  const diffClass = q.difficulty==='Easy'?'tag-diff-easy':q.difficulty==='Medium'?'tag-diff-medium':'tag-diff-hard';
  card.innerHTML = `
    <div class="q-header">
      <span class="q-number">Question ${q.id}</span>
      <div class="q-tags">
        <span class="q-tag tag-domain">${DOMAIN_LABELS[q.domain]}</span>
        <span class="q-tag tag-domain">${q.taskStatement}</span>
        <span class="q-tag ${diffClass}">${q.difficulty}</span>
      </div>
    </div>
    <div class="q-context">${q.context}</div>
    <div class="q-stem">${q.stem}</div>
    <ul class="options-list" id="opts-${q.id}">
      ${q.options.map((opt,i)=>`
        <li class="option-item" id="opt-${q.id}-${i}" onclick="selectAnswer(${q.id},${i})">
          <input type="radio" name="q${q.id}" value="${i}" ${answers[q.id]===i?'checked':''}>
          <span class="option-letter">${String.fromCharCode(65+i)})</span>
          <span>${opt}</span>
        </li>`).join('')}
    </ul>
    <div class="q-footer">
      <button class="flag-btn ${flagged.has(q.id)?'active':''}" id="flag-${q.id}" onclick="toggleFlag(${q.id})">
        ${flagged.has(q.id)?'Unflag':'Flag for Review'}
      </button>
    </div>
    <div class="explanation-box" id="exp-${q.id}"></div>
  `;
  if(answers[q.id]!==undefined) {
    card.classList.add('answered');
    if(flagged.has(q.id)) card.classList.add('flagged');
  }
  if(flagged.has(q.id) && answers[q.id]===undefined) card.classList.add('flagged');
  return card;
}

function selectAnswer(qid, optIdx) {
  if(submitted) return;
  answers[qid] = optIdx;
  const card = document.getElementById('card-'+qid);
  card.classList.add('answered');
  document.querySelectorAll(`#opts-${qid} .option-item`).forEach((el,i) => {
    el.classList.toggle('selected', i===optIdx);
    el.querySelector('input').checked = (i===optIdx);
  });
  updateProgress();
  renderNav();
}

function toggleFlag(qid) {
  if(submitted) return;
  if(flagged.has(qid)) { flagged.delete(qid); } else { flagged.add(qid); }
  const card = document.getElementById('card-'+qid);
  const btn = document.getElementById('flag-'+qid);
  if(flagged.has(qid)) { card.classList.add('flagged'); btn.classList.add('active'); btn.textContent='Unflag'; }
  else { card.classList.remove('flagged'); btn.classList.remove('active'); btn.textContent='Flag for Review'; }
  renderNav();
}

function renderNav() {
  const grid = document.getElementById('q-grid');
  const questionsToShow = retryMode ? QUESTIONS.filter(q => retrySet.includes(q.id)) : QUESTIONS;
  grid.innerHTML = questionsToShow.map(q => {
    let cls = 'q-btn';
    if(submitted) { cls += answers[q.id]===q.correct?' correct':' incorrect'; }
    else if(flagged.has(q.id)) cls += ' flagged';
    else if(answers[q.id]!==undefined) cls += ' answered';
    return `<button class="${cls}" onclick="scrollToQuestion(${q.id})" title="Q${q.id}">${q.id}</button>`;
  }).join('');
}

function scrollToQuestion(qid) {
  const el = document.getElementById('card-'+qid);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('current'));
  if(el) el.classList.add('current');
  renderNav();
  const btn = document.querySelector(`#q-grid .q-btn:nth-child(${qid})`);
  if(btn) btn.classList.add('current');
}

function updateProgress() {
  const cnt = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = `${cnt} / ${QUESTIONS.length} answered`;
}

function showResults() {
  document.getElementById('exam-ui').style.display = 'none';
  const screen = document.getElementById('results-screen');
  screen.style.display = 'block';

  const questionsToScore = retryMode ? QUESTIONS.filter(q => retrySet.includes(q.id)) : QUESTIONS;
  let correct = 0, domainStats = {}, scenarioStats = {}, taskStats = {};

  Object.keys(DOMAIN_LABELS).forEach(d => domainStats[d]={correct:0,total:0,weight:DOMAIN_WEIGHTS[d]});
  Object.keys(SCENARIO_LABELS).forEach(s => scenarioStats[s]={correct:0,total:0});

  questionsToScore.forEach(q => {
    const isCorrect = answers[q.id] === q.correct;
    if(isCorrect) correct++;
    if(!domainStats[q.domain]) domainStats[q.domain]={correct:0,total:0,weight:DOMAIN_WEIGHTS[q.domain]};
    domainStats[q.domain].total++;
    if(isCorrect) domainStats[q.domain].correct++;
    const sk = q.scenario.toString();
    if(!scenarioStats[sk]) scenarioStats[sk]={correct:0,total:0};
    scenarioStats[sk].total++;
    if(isCorrect) scenarioStats[sk].correct++;
    if(!taskStats[q.taskStatement]) taskStats[q.taskStatement]={correct:0,total:0,domain:q.domain};
    taskStats[q.taskStatement].total++;
    if(isCorrect) taskStats[q.taskStatement].correct++;
  });

  const total = questionsToScore.length;
  const pct = Math.round((correct/total)*100);
  const scaled = Math.round(100 + (correct/total)*900);
  const pass = scaled >= 720;

  let domainBars = Object.entries(domainStats).filter(([,v])=>v.total>0).map(([d,v])=>{
    const p = v.total>0?Math.round((v.correct/v.total)*100):0;
    const cls = p>=75?'good':p>=60?'mid':'low';
    return `<div class="domain-row">
      <div class="domain-row-header"><span class="domain-name">${DOMAIN_LABELS[d]}</span><span class="domain-pct" style="color:${p>=75?'#388e3c':p>=60?'#f57c00':'#c62828'}">${p}% (${v.correct}/${v.total})</span></div>
      <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${p}%"></div></div>
    </div>`;
  }).join('');

  let scenarioRows = Object.entries(scenarioStats).filter(([,v])=>v.total>0).map(([s,v])=>{
    const p = v.total>0?Math.round((v.correct/v.total)*100):0;
    return `<div class="scenario-row"><span>${SCENARIO_LABELS[parseInt(s)]||'Scenario '+s}</span><span style="font-weight:700;color:${p>=75?'#388e3c':p>=60?'#f57c00':'#c62828'}">${p}% (${v.correct}/${v.total})</span></div>`;
  }).join('');

  const weakTasks = Object.entries(taskStats).filter(([,v])=>v.total>0&&(v.correct/v.total)<0.6)
    .sort((a,b)=>(a[1].correct/a[1].total)-(b[1].correct/b[1].total));
  const okTasks = Object.entries(taskStats).filter(([,v])=>v.total>0&&(v.correct/v.total)>=0.6&&(v.correct/v.total)<0.8);
  const strongTasks = Object.entries(taskStats).filter(([,v])=>v.total>0&&(v.correct/v.total)>=0.8);

  const heatmapItems = [
    ...weakTasks.map(([t,v])=>`<div class="heatmap-item weak"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}% (${DOMAIN_LABELS[v.domain]})</div>`),
    ...okTasks.map(([t,v])=>`<div class="heatmap-item ok"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}% (${DOMAIN_LABELS[v.domain]})</div>`),
    ...strongTasks.map(([t,v])=>`<div class="heatmap-item strong"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}% (${DOMAIN_LABELS[v.domain]})</div>`)
  ].join('');

  const studyRecs = weakTasks.slice(0,5).map(([t,v])=>`<li>Review <strong>${t}</strong> (${DOMAIN_LABELS[v.domain]}) — scored below 60%</li>`).join('');

  const incorrectIds = questionsToScore.filter(q=>answers[q.id]!==q.correct).map(q=>q.id);

  screen.innerHTML = `
    <div class="results-card">
      <div class="results-header">
        <h2>Exam Results — Mock Exam A</h2>
        <div class="score-circle ${pass?'pass':'fail'}">
          <span class="score-number">${scaled}</span>
          <span class="score-label">/1000</span>
        </div>
        <div><span class="pass-fail-badge ${pass?'pass-badge':'fail-badge'}">${pass?'PASS':'FAIL'}</span></div>
        <p style="color:#555;margin-top:8px">${correct}/${total} correct (${pct}%) &bull; Passing threshold: 720/1000</p>
        ${!pass?`<p style="color:#c62828;font-size:.85rem;margin-top:4px">You need approximately ${Math.ceil((720-scaled)/9)} more correct answers to pass.</p>`:''}
      </div>
    </div>
    <div class="results-card">
      <div class="domain-bars">
        <h3>Domain Performance</h3>
        ${domainBars}
      </div>
      <div class="scenario-breakdown">
        <h3 style="margin-bottom:12px">Scenario Performance</h3>
        ${scenarioRows}
      </div>
    </div>
    <div class="results-card">
      <h3 style="margin-bottom:12px">Task Statement Heatmap</h3>
      <div style="font-size:.8rem;color:#666;margin-bottom:8px"><span style="color:#c62828">Red = below 60%</span> &bull; <span style="color:#f57c00">Amber = 60-79%</span> &bull; <span style="color:#388e3c">Green = 80%+</span></div>
      <div class="heatmap-grid">${heatmapItems||'<p style="color:#888">No data available</p>'}</div>
    </div>
    ${weakTasks.length>0?`<div class="results-card"><div class="study-next"><h3>What To Study Next</h3><ul>${studyRecs}</ul></div></div>`:''}
    <div class="results-card">
      <h3 style="margin-bottom:16px">Review Questions</h3>
      ${buildReviewQuestions(questionsToScore)}
    </div>
    <div class="results-actions">
      <button class="action-btn btn-primary" onclick="location.reload()">Retake Exam</button>
      ${incorrectIds.length>0?`<button class="action-btn btn-secondary" onclick="startRetryMode(${JSON.stringify(incorrectIds)})">Retry Incorrect (${incorrectIds.length})</button>`:''}
    </div>
  `;
}

function buildReviewQuestions(questions) {
  return questions.map(q=>{
    const userAns = answers[q.id];
    const isCorrect = userAns === q.correct;
    const optLetters = ['A','B','C','D'];
    const optItems = q.options.map((opt,i)=>{
      let cls = 'option-item';
      if(i===q.correct) cls += ' correct-answer';
      if(i===userAns && !isCorrect) cls += ' wrong-selected';
      const expCls = i===q.correct?'exp-correct-label':'exp-wrong-label';
      return `<li class="${cls}" style="cursor:default;margin-bottom:6px">
        <span class="option-letter">${optLetters[i]})</span>
        <div><div>${opt}</div>
        <div style="font-size:.8rem;margin-top:4px;color:${i===q.correct?'#2e7d32':'#555'}">${q.explanations[i]}</div></div>
      </li>`;
    }).join('');
    return `<div style="margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f0f2f5">
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <span style="font-size:.8rem;font-weight:700;color:#0f3460">Q${q.id}</span>
        <span class="q-tag tag-domain">${q.taskStatement}</span>
        <span class="q-tag ${isCorrect?'tag-diff-easy':'tag-diff-hard'}">${isCorrect?'Correct':'Incorrect'}</span>
      </div>
      <div class="q-context" style="margin-bottom:8px">${q.context}</div>
      <div class="q-stem" style="margin-bottom:12px">${q.stem}</div>
      <ul class="options-list">${optItems}</ul>
    </div>`;
  }).join('');
}

function startRetryMode(incorrectIds) {
  retrySet = incorrectIds;
  retryMode = true;
  answers = {};
  flagged.clear();
  submitted = false;
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('exam-ui').style.display = 'block';
  document.getElementById('retry-mode-banner').style.display = 'block';
  document.getElementById('retry-mode-banner').textContent = `Retry Mode: ${incorrectIds.length} questions`;
  renderQuestions();
  renderNav();
  updateProgress();
}
</script>
</body>
</html>
