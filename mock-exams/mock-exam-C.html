<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
#exam-header{background:linear-gradient(135deg,#1a2e1a 0%,#1e4025 50%,#0f5c2e 100%);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.3)}
#exam-header h1{font-size:1.1rem;font-weight:600;letter-spacing:.5px}
#timer-box{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:8px 18px;font-size:1.3rem;font-weight:700;font-family:monospace;letter-spacing:2px;min-width:90px;text-align:center}
#timer-box.warning{background:rgba(255,100,0,0.3);border-color:#ff6400;color:#ff6400;animation:pulse 1s infinite}
#timer-box.danger{background:rgba(220,0,0,0.3);border-color:#dc0000;color:#ff4444;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#header-right{display:flex;align-items:center;gap:12px}
#progress-text{font-size:.85rem;opacity:.8}
#submit-btn{background:#e94560;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}

#main-layout{display:flex;max-width:1400px;margin:0 auto;padding:24px;gap:20px}
#sidebar{width:260px;flex-shrink:0}

#q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:16px}
.q-btn{width:100%;aspect-ratio:1;border:2px solid #e0e0e0;border-radius:6px;background:#fff;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.q-btn:hover{border-color:#0f5c2e;color:#0f5c2e}

.q-btn.flagged{background:#fff3cd;border-color:#f57c00;color:#f57c00}
.q-btn.current{background:#0f5c2e;border-color:#0f5c2e;color:#fff}

.scenario-header{background:linear-gradient(135deg,#1a2e1a,#0f5c2e);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:20px}
.scenario-header h2{font-size:1rem;color:#a8f0c8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.scenario-header p{font-size:.95rem;line-height:1.6;opacity:.9}
.question-card{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.07);border-left:4px solid #e0e0e0;transition:border-color .2s}
.question-card.answered{border-left-color:#2e7d32}
.question-card.flagged{border-left-color:#f57c00}

.question-card.correct{border-left-color:#388e3c}
.question-card.incorrect{border-left-color:#c62828}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.q-number{font-size:.8rem;font-weight:700;color:#0f5c2e;text-transform:uppercase;letter-spacing:.5px}
.q-tags{display:flex;gap:6px;flex-wrap:wrap}
.q-tag{font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:600}
.tag-domain{background:#e8f5e9;color:#1b5e20}
.tag-diff-easy{background:#e8f5e9;color:#2e7d32}
.tag-diff-medium{background:#fff8e1;color:#e65100}
.tag-diff-hard{background:#fce4ec;color:#880e4f}
.q-stem{font-size:1rem;line-height:1.65;color:#1a1a2e;margin-bottom:16px;font-weight:500}
.q-context{font-size:.9rem;line-height:1.6;color:#444;margin-bottom:14px;padding:12px 16px;background:#f8f9fa;border-radius:8px;border-left:3px solid #a8f0c8}
.options-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.option-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer;transition:all .15s;font-size:.93rem;line-height:1.5}
.option-item:hover{border-color:#0f5c2e;background:#f0fff8}
.option-item input[type=radio]{margin-top:2px;flex-shrink:0;accent-color:#0f5c2e;width:16px;height:16px;cursor:pointer}
.option-item.selected{border-color:#2e7d32;background:#e8f5e9}
.option-item.correct-answer{border-color:#388e3c!important;background:#e8f5e9!important}
.option-item.wrong-selected{border-color:#c62828!important;background:#ffebee!important}

.q-footer{margin-top:14px}
.flag-btn{background:none;border:1px solid #f57c00;color:#f57c00;border-radius:6px;padding:6px 14px;font-size:.8rem;cursor:pointer;font-weight:600;transition:all .2s}
.flag-btn:hover,.flag-btn.active{background:#f57c00;color:#fff}
#results-screen{display:none;max-width:900px;margin:0 auto;padding:24px}
.results-card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.1);margin-bottom:20px}
.results-header{text-align:center;margin-bottom:32px}
.results-header h2{font-size:1.8rem;margin-bottom:8px;color:#1a1a2e}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;font-weight:700;border:6px solid}
.score-circle.pass{border-color:#388e3c;background:#e8f5e9;color:#2e7d32}
.score-circle.fail{border-color:#c62828;background:#ffebee;color:#c62828}
.score-number{font-size:2rem}.score-label{font-size:.8rem;opacity:.8}
.pass-fail-badge{display:inline-block;padding:6px 24px;border-radius:20px;font-weight:700;font-size:1rem;margin-bottom:8px}
.pass-badge{background:#e8f5e9;color:#2e7d32;border:2px solid #388e3c}
.fail-badge{background:#ffebee;color:#c62828;border:2px solid #c62828}
.domain-row{margin-bottom:14px}
.domain-row-header{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:4px}
.domain-name{font-weight:600;color:#1a1a2e}
.bar-bg{background:#f0f2f5;border-radius:4px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.bar-fill.good{background:#388e3c}.bar-fill.mid{background:#f57c00}.bar-fill.low{background:#c62828}
.scenario-breakdown{margin-top:24px}
.scenario-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f2f5;font-size:.9rem}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.heatmap-item{padding:10px 14px;border-radius:8px;font-size:.82rem}
.heatmap-item.weak{background:#ffebee;border-left:3px solid #c62828}
.heatmap-item.ok{background:#fff8e1;border-left:3px solid #f57c00}
.heatmap-item.strong{background:#e8f5e9;border-left:3px solid #388e3c}
.study-next{background:#f0fff8;border-radius:12px;padding:20px;margin-top:16px}
.study-next h3{color:#0f5c2e;margin-bottom:12px}
.study-next ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.study-next li{padding:8px 12px;background:#fff;border-radius:6px;font-size:.88rem;border-left:3px solid #0f5c2e}
.results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.action-btn{padding:12px 24px;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:#0f5c2e;color:#fff}
.btn-primary:hover{background:#1e7a40;transform:translateY(-1px)}
.btn-secondary{background:#fff;color:#0f5c2e;border:2px solid #0f5c2e}
.btn-secondary:hover{background:#f0fff8}
#config-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
#config-modal.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.modal-box h2{margin-bottom:8px;color:#1a1a2e}
.modal-box p{font-size:.9rem;color:#555;margin-bottom:24px}
.modal-field label{display:block;font-size:.85rem;font-weight:600;color:#555;margin-bottom:6px}
.modal-field input{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:1rem;margin-bottom:16px}
.modal-actions{display:flex;gap:12px;justify-content:flex-end}
@media(max-width:768px){#main-layout{flex-direction:column;padding:12px}#sidebar{width:100%}#sidebar-card{position:static}}
</style>

<body>
<div id="config-modal" class="show">
  <div class="modal-box">
    <h2>Mock Exam C</h2>
    <p>Scenarios: Code Generation (S2), Developer Productivity (S4), CI/CD (S5), Structured Extraction (S6)<br>50 questions &bull; Final readiness check</p>
    <div class="modal-field">
      <label>Timer Duration (minutes)</label>
      <input type="number" id="timer-input" value="90" min="10" max="180">
    </div>
    <div class="modal-actions">
      <button class="action-btn btn-primary" onclick="startExam()">Start Exam</button>
    </div>
  </div>
</div>

<div id="exam-ui" style="display:none">
  <div id="exam-header">
    <h1>Mock Exam C &mdash; Claude Certified Architect: Foundations</h1>
    <div id="header-right">
      <span id="progress-text">0 / 50 answered</span>
      <div id="timer-box">90:00</div>
      <button id="submit-btn" onclick="confirmSubmit()">Submit Exam</button>
    </div>
  </div>
  <div id="main-layout">
    <div id="sidebar">
      <div id="sidebar-card">
        <h3>Question Navigator</h3>
        <div id="q-grid"></div>
        <div id="sidebar-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#e8f5e9;border:1px solid #2e7d32"></div> Answered</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fff3cd;border:1px solid #f57c00"></div> Flagged</div>
          <div class="legend-item"><div class="legend-dot" style="background:#fff;border:1px solid #ccc"></div> Unanswered</div>
        </div>
      </div>
    </div>
    <div id="content-area"></div>
  </div>
</div>
<div id="results-screen"></div>

<script>
const QUESTIONS = [
  // ===== SCENARIO 2: Code Generation with Claude Code (Q1-13) =====
  {
    id:1, scenario:2, domain:'D3', taskStatement:'3.1', difficulty:'Medium',
    context:'Your team\'s CLAUDE.md has grown to 1,200 lines. It contains: project setup instructions, React coding standards, API handler patterns, database migration rules, testing conventions (Jest), and CI/CD deployment checklists. Every Claude Code session loads the entire file, but most sessions only involve 1-2 of these areas.',
    stem:'What organizational approach would reduce irrelevant context loading while maintaining team-wide access?',
    options:[
      'Split into separate files in .claude/rules/ with YAML frontmatter path scoping so each rule file loads only when editing files that match its glob patterns',
      'Create a single compressed CLAUDE.md that removes whitespace and comments to reduce token usage',
      'Move rarely-used sections to an archive CLAUDE.md.backup file',
      'Split into individual files per developer that each maintain their own preferred subset'
    ],
    correct:0,
    explanations:[
      'CORRECT. .claude/rules/ files with path-scoped YAML frontmatter (e.g., paths: ["src/components/**/*.tsx"] for React rules, paths: ["**/*.test.js"] for Jest conventions) load only when editing matching files, dramatically reducing irrelevant context while preserving team-wide access via version control.',
      'Compressing to reduce tokens is superficial and makes the file harder to maintain. The structural organization problem remains.',
      'Moving to a backup file removes the content from active use — developers would need to manually reference it.',
      'Per-developer CLAUDE.md files are not version-controlled and defeat the purpose of shared team standards.'
    ]
  },
  {
    id:2, scenario:2, domain:'D3', taskStatement:'3.2', difficulty:'Hard',
    context:'Your team creates a /security-audit skill that performs an extensive security scan of the codebase. It reads hundreds of files, produces detailed findings, and generates a comprehensive security report. The skill takes several minutes and produces 15,000 tokens of output. After running it, the main development session is significantly degraded.',
    stem:'Which combination of SKILL.md configurations would best address both the context pollution and the security of tool usage?',
    options:[
      'context: fork to isolate output, plus allowed-tools: ["Read", "Grep", "Glob"] to restrict the skill to read-only file operations, preventing accidental modifications',
      'max-turns: 50 to limit the skill duration, plus output-format: summary to compress results',
      'context: inherit to share main session context, plus priority: low to reduce resource usage',
      'argument-hint: "optional" to make the skill non-blocking'
    ],
    correct:0,
    explanations:[
      'CORRECT. context: fork isolates the verbose security scan output from the main conversation. allowed-tools: ["Read", "Grep", "Glob"] restricts the skill to read-only tools, preventing accidental file modifications during a security audit — appropriate for an audit skill that should observe, not change.',
      'max-turns and output-format are not documented SKILL.md frontmatter fields.',
      'context: inherit would share context rather than isolate it — the opposite of what is needed. priority is not a documented field.',
      'argument-hint controls the parameter prompt, not execution behavior or context isolation.'
    ]
  },
  {
    id:3, scenario:2, domain:'D3', taskStatement:'3.3', difficulty:'Medium',
    context:'Your project has database migration files in db/migrations/ named with dates (e.g., 20240401_add_user_table.sql) and application migration scripts in src/migrations/ that must follow different naming and structure conventions. Both paths have "migration" in them but require completely different rules.',
    stem:'What configuration correctly applies different rules to each migration type?',
    options:[
      'Put both sets of rules in root CLAUDE.md and let Claude infer which applies based on the file extension',
      'Create two .claude/rules/ files: db-migrations.md with paths: ["db/migrations/**/*.sql"] and app-migrations.md with paths: ["src/migrations/**/*.ts"], each with their respective conventions',
      'Create a single CLAUDE.md in a migrations/ directory at the project root',
      'Use a skill that accepts the migration type as an argument'
    ],
    correct:1,
    explanations:[
      'Root CLAUDE.md with inference is unreliable for distinguishing rules that apply to similar file locations.',
      'CORRECT. Two separate .claude/rules/ files with distinct glob patterns correctly apply different conventions: db/migrations/**/*.sql for SQL migration files, src/migrations/**/*.ts for TypeScript application migrations. Each loads only when editing its respective files.',
      'A migrations/ directory CLAUDE.md cannot differentiate between db/migrations/ and src/migrations/ since they are in different branches of the file tree.',
      'Manual skill invocation requires developers to remember which skill to use. Automatic path-based rule loading is more reliable and ergonomic.'
    ]
  },
  {
    id:4, scenario:2, domain:'D3', taskStatement:'3.4', difficulty:'Medium',
    context:'A developer asks Claude Code to add input validation to a form component. They specify: check that email is valid, name is not empty, and phone number matches the format XXX-XXX-XXXX. There is one existing form component to modify.',
    stem:'What mode should be used?',
    options:[
      'Plan mode, because form validation often has hidden complexity',
      'Direct execution, because this is a clearly scoped modification with explicit requirements and a single file',
      'Plan mode, because regex for phone validation may have edge cases to consider',
      'Create a subagent to handle all form-related modifications'
    ],
    correct:1,
    explanations:[
      'Assuming hidden complexity without evidence leads to unnecessary overhead. The task description is clear and well-bounded.',
      'CORRECT. The exam guide: direct execution for "well-understood changes with clear scope." Three explicit validation rules in a single form component has no architectural decisions, multiple valid approaches, or multi-file impact.',
      'While phone regex edge cases exist, the developer has specified the exact format (XXX-XXX-XXXX). No exploration is needed.',
      'A subagent adds overhead for a simple, single-file change.'
    ]
  },
  {
    id:5, scenario:2, domain:'D3', taskStatement:'3.4', difficulty:'Hard',
    context:'Your team needs to add observability to the application. This involves adding distributed tracing to all service calls, integrating with your existing Datadog setup, deciding between two instrumentation libraries (OpenTelemetry vs Datadog SDK directly), adding trace context propagation across 30+ service files, and updating CI/CD to validate trace configuration.',
    stem:'What approach should you take?',
    options:[
      'Use direct execution with a comprehensive prompt listing all the changes needed',
      'Use plan mode: explore the codebase to understand service call patterns, evaluate the two library options against your constraints, then design the implementation approach before making any changes to the 30+ files',
      'Spawn a specialized observability subagent to handle all instrumentation changes',
      'Start with direct execution for one service, learn from that, then apply the pattern to the rest'
    ],
    correct:1,
    explanations:[
      'A comprehensive prompt for 30+ file changes without prior exploration risks incorrect architectural decisions and costly rework.',
      'CORRECT. This is a canonical plan mode scenario: 30+ files, multiple valid approaches (library choice), architectural decisions (trace propagation strategy), and multi-system impact (CI/CD integration). Plan mode enables design before commitment.',
      'No specialized "observability subagent" exists. And even if it did, the coordinator should use plan mode to understand the scope before delegating.',
      'Starting with one service as a pattern is an incremental direct execution approach. For architectural decisions affecting 30+ files, the exam guide recommends plan mode before any changes.'
    ]
  },
  {
    id:6, scenario:2, domain:'D3', taskStatement:'3.5', difficulty:'Medium',
    context:'You need Claude Code to implement a custom sorting function for a data table. The sort must handle: mixed string/number columns, locale-aware string comparison, null values always last regardless of sort direction, and case-insensitive string comparison. Your prose descriptions have produced three implementations with different null-handling behavior.',
    stem:'What is the most effective way to specify the null-handling behavior precisely?',
    options:[
      'Add "IMPORTANT: nulls must ALWAYS be last" in all-caps to emphasize the requirement',
      'Provide concrete input/output examples: sort([3, null, 1, null, 2], ascending) → [1, 2, 3, null, null]; sort([3, null, 1, null, 2], descending) → [3, 2, 1, null, null]',
      'Ask Claude to first ask clarifying questions about null handling',
      'Implement null handling yourself and ask Claude to implement the rest'
    ],
    correct:1,
    explanations:[
      'All-caps emphasis is still prose. Three implementations with different behavior means prose interpretation is unreliable, regardless of emphasis.',
      'CORRECT. Concrete input/output examples are unambiguous — they show the exact expected behavior for ascending and descending sorts with nulls. This eliminates interpretive variance in a way that prose cannot.',
      'The interview pattern surfaces unknown unknowns. Here the requirement is known (nulls last) but prose has failed to communicate it precisely — examples are the right tool.',
      'Splitting the implementation creates integration risk. Examples enable Claude to implement the complete, coherent solution.'
    ]
  },
  {
    id:7, scenario:2, domain:'D4', taskStatement:'4.1', difficulty:'Medium',
    context:'Your CI pipeline reviews PRs with the prompt "review this code for quality issues." Developers report receiving feedback on obvious things like variable naming and inconsistent spacing that they would rather handle through linting tools. Meaningful feedback on logic errors and security issues is being diluted by noise.',
    stem:'What prompt change would focus feedback on high-value issues?',
    options:[
      'Add "focus on the most important issues only"',
      'Define explicit categorical criteria: "report: logic errors, security vulnerabilities, race conditions, resource leaks. Do not report: naming conventions (linting handles this), whitespace/formatting (prettier handles this), obvious code style."',
      'Reduce the feedback to a single highest-priority finding per PR',
      'Add "be strict about code quality" to increase precision'
    ],
    correct:1,
    explanations:[
      '"Most important issues" is vague and relative. The model has no calibrated definition of importance for this context.',
      'CORRECT. The exam guide: explicit categorical criteria specifying which issues to report vs. skip. Naming which tool handles each category (linting, prettier) provides clear, actionable boundaries that the model can follow consistently.',
      'One finding per PR is an artificial constraint that would cause real issues to be omitted.',
      '"Be strict" is a general instruction without semantic specificity — the exam guide identifies such instructions as ineffective for precision.'
    ]
  },
  {
    id:8, scenario:2, domain:'D3', taskStatement:'3.6', difficulty:'Hard',
    context:'Your GitHub Actions CI pipeline reviews pull requests. After each review, findings are posted as inline PR comments. Two weeks after deployment, developers notice that when they push fixes, all previously-addressed review comments reappear as if newly found.',
    stem:'What change to the CI pipeline would prevent duplicate findings?',
    options:[
      'Clear all PR comments before each review run',
      'When running the review after new commits, provide the prior review findings as context and instruct Claude to only report issues that are new or were previously flagged but not yet addressed',
      'Limit each PR to a maximum of three review cycles',
      'Use a database to track all findings across all PRs and deduplicate at storage time'
    ],
    correct:1,
    explanations:[
      'Clearing prior comments removes the audit trail and removes context about what has already been addressed.',
      'CORRECT. The exam guide describes this exactly: "Including prior review findings in context when re-running reviews after new commits, instructing Claude to report only new or still-unaddressed issues." Context-aware re-reviews prevent duplication.',
      'Limiting review cycles leaves later-commit code unreviewed.',
      'Database deduplication is a downstream fix that does not address the root cause (the model re-finding the same issues without context).'
    ]
  },
  {
    id:9, scenario:2, domain:'D4', taskStatement:'4.6', difficulty:'Hard',
    context:'Your CI pipeline generates code and then reviews it for security vulnerabilities in the same Claude Code session. The security review consistently gives the generated code high scores, but human security reviewers find significant issues that the automated review missed.',
    stem:'What architectural change would improve security review effectiveness?',
    options:[
      'Increase the review prompt detail to make Claude more thorough',
      'Use an independent Claude instance for the security review that has no access to the code generation session\'s reasoning context',
      'Add "be critical and find security vulnerabilities" to the review prompt',
      'Have the security review run multiple times and only flag issues found in all runs'
    ],
    correct:1,
    explanations:[
      'More detail in the same-session review does not address the retained reasoning context bias.',
      'CORRECT. The exam guide: "independent review instances (without prior reasoning context) are more effective at catching subtle issues than self-review." The generator retains reasoning context that makes it less likely to question its own decisions.',
      'Prompting for criticism in the same session does not overcome the reasoning context bias.',
      'Running the same biased review multiple times produces the same biased results. Consensus does not help when the underlying bias is consistent.'
    ]
  },
  {
    id:10, scenario:2, domain:'D3', taskStatement:'3.6', difficulty:'Medium',
    context:'Your CI test generation runs on every PR and generates tests for modified functions. The generated tests are generally good quality but frequently suggest test cases that already exist in the test suite, creating redundant scenarios and inflating the test count unnecessarily.',
    stem:'What is the most effective way to eliminate test redundancy in CI?',
    options:[
      'Post-process generated tests to remove any scenarios with similar names to existing tests',
      'Include the existing test files for the modified code in the context when generating tests, so Claude can see what is already covered and avoid duplicating existing scenarios',
      'Ask Claude to only generate one new test per modified function',
      'Run generated tests and remove any that produce the same pass/fail result as an existing test'
    ],
    correct:1,
    explanations:[
      'Name-based deduplication misses semantic duplicates with different names.',
      'CORRECT. The exam guide: "providing existing test files in context so test generation avoids suggesting duplicate scenarios already covered by the test suite." With visibility into existing tests, Claude can focus on gaps.',
      'One test per function artificially limits coverage improvement for complex functions.',
      'Pass/fail deduplication requires running all tests and may remove tests that cover different edge cases through different paths.'
    ]
  },
  {
    id:11, scenario:2, domain:'D4', taskStatement:'4.2', difficulty:'Hard',
    context:'Your code review AI generates feedback in varying formats: sometimes as a numbered list, sometimes as prose paragraphs, sometimes with code snippets, sometimes without. The downstream ticket creation system expects a consistent format: [SEVERITY] File:Line — Issue — Suggested Fix.',

let timerInterval=null,timeLeft=90*60,submitted=false,retryMode=false;
let answers={},flagged=new Set(),retrySet=[];

function startExam(){const m=parseInt(document.getElementById('timer-input').value)||90;timeLeft=m*60;document.getElementById('config-modal').classList.remove('show');document.getElementById('exam-ui').style.display='block';renderQ();renderNav();startTimer();}
function startTimer(){updateTimer();timerInterval=setInterval(()=>{timeLeft--;updateTimer();if(timeLeft<=0){clearInterval(timerInterval);submitted=true;showResults();}},1000);}
function updateTimer(){const m=Math.floor(timeLeft/60),s=timeLeft%60;const el=document.getElementById('timer-box');el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.className=timeLeft<=300?'danger':timeLeft<=900?'warning':'';}
function confirmSubmit(){const u=QUESTIONS.length-Object.keys(answers).length;if(confirm(u>0?`${u} unanswered. Submit?`:'Submit exam?')){clearInterval(timerInterval);submitted=true;showResults();}}

function renderQ(){
  const c=document.getElementById('content-area');c.innerHTML='';let cs=null;
  const qt=retryMode?QUESTIONS.filter(q=>retrySet.includes(q.id)):QUESTIONS;
  qt.forEach(q=>{if(q.scenario!==cs){cs=q.scenario;const h=document.createElement('div');h.className='scenario-header';h.innerHTML=`<h2>${SCENARIO_LABELS[q.scenario]}</h2><p>${getSDesc(q.scenario)}</p>`;c.appendChild(h);}c.appendChild(mkCard(q));});
}
function getSDesc(s){const d={2:'Claude Code for code generation, custom commands, CLAUDE.md configurations, and CI/CD integration.',4:'Developer productivity tools using built-in tools (Read, Write, Bash, Grep, Glob) and MCP servers.',5:'CI/CD pipeline integration for automated code review, test generation, and structured output.',6:'Structured data extraction from unstructured documents with JSON schemas, validation, and batch processing.'};return d[s]||'';}
function mkCard(q){
  const card=document.createElement('div');card.className='question-card';card.id='card-'+q.id;
  const dc=q.difficulty==='Easy'?'tag-diff-easy':q.difficulty==='Medium'?'tag-diff-medium':'tag-diff-hard';
  card.innerHTML=`<div class="q-header"><span class="q-number">Question ${q.id}</span><div class="q-tags"><span class="q-tag tag-domain">${DOMAIN_LABELS[q.domain]}</span><span class="q-tag tag-domain">${q.taskStatement}</span><span class="q-tag ${dc}">${q.difficulty}</span></div></div><div class="q-context">${q.context}</div><div class="q-stem">${q.stem}</div><ul class="options-list" id="opts-${q.id}">${q.options.map((o,i)=>`<li class="option-item ${answers[q.id]===i?'selected':''}" id="opt-${q.id}-${i}" onclick="pick(${q.id},${i})"><input type="radio" name="q${q.id}" value="${i}" ${answers[q.id]===i?'checked':''}><span class="option-letter">${String.fromCharCode(65+i)})</span><span>${o}</span></li>`).join('')}</ul><div class="q-footer"><button class="flag-btn ${flagged.has(q.id)?'active':''}" id="flag-${q.id}" onclick="tog(${q.id})">${flagged.has(q.id)?'Unflag':'Flag for Review'}</button></div>`;
  if(answers[q.id]!==undefined)card.classList.add('answered');
  if(flagged.has(q.id))card.classList.add('flagged');
  return card;
}
function pick(qid,i){if(submitted)return;answers[qid]=i;document.getElementById('card-'+qid).classList.add('answered');document.querySelectorAll(`#opts-${qid} .option-item`).forEach((el,j)=>{el.classList.toggle('selected',j===i);el.querySelector('input').checked=(j===i);});updProg();renderNav();}
function tog(qid){if(submitted)return;flagged.has(qid)?flagged.delete(qid):flagged.add(qid);const card=document.getElementById('card-'+qid),btn=document.getElementById('flag-'+qid);if(flagged.has(qid)){card.classList.add('flagged');btn.classList.add('active');btn.textContent='Unflag';}else{card.classList.remove('flagged');btn.classList.remove('active');btn.textContent='Flag for Review';}renderNav();}
function renderNav(){const g=document.getElementById('q-grid');const qt=retryMode?QUESTIONS.filter(q=>retrySet.includes(q.id)):QUESTIONS;g.innerHTML=qt.map(q=>{let c='q-btn';if(submitted)c+=answers[q.id]===q.correct?' correct':' incorrect';else if(flagged.has(q.id))c+=' flagged';else if(answers[q.id]!==undefined)c+=' answered';return`<button class="${c}" onclick="scrollTo(${q.id})">${q.id}</button>`;}).join('');}
function scrollTo(qid){const el=document.getElementById('card-'+qid);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('current'));if(el)el.classList.add('current');}
function updProg(){document.getElementById('progress-text').textContent=`${Object.keys(answers).length} / ${QUESTIONS.length} answered`;}

function showResults(){
  document.getElementById('exam-ui').style.display='none';
  const sc=document.getElementById('results-screen');sc.style.display='block';
  const qt=retryMode?QUESTIONS.filter(q=>retrySet.includes(q.id)):QUESTIONS;
  let corr=0,ds={},ss={},ts={};
  Object.keys(DOMAIN_LABELS).forEach(d=>ds[d]={correct:0,total:0});
  Object.keys(SCENARIO_LABELS).forEach(s=>ss[s]={correct:0,total:0});
  qt.forEach(q=>{const ok=answers[q.id]===q.correct;if(ok)corr++;if(!ds[q.domain])ds[q.domain]={correct:0,total:0};ds[q.domain].total++;if(ok)ds[q.domain].correct++;const sk=q.scenario.toString();if(!ss[sk])ss[sk]={correct:0,total:0};ss[sk].total++;if(ok)ss[sk].correct++;if(!ts[q.taskStatement])ts[q.taskStatement]={correct:0,total:0,domain:q.domain};ts[q.taskStatement].total++;if(ok)ts[q.taskStatement].correct++;});
  const tot=qt.length,pct=Math.round((corr/tot)*100),scl=Math.round(100+(corr/tot)*900),pass=scl>=720;
  const db=Object.entries(ds).filter(([,v])=>v.total>0).map(([d,v])=>{const p=v.total>0?Math.round((v.correct/v.total)*100):0;const cl=p>=75?'good':p>=60?'mid':'low';return`<div class="domain-row"><div class="domain-row-header"><span class="domain-name">${DOMAIN_LABELS[d]}</span><span style="font-weight:700;color:${p>=75?'#388e3c':p>=60?'#f57c00':'#c62828'}">${p}% (${v.correct}/${v.total})</span></div><div class="bar-bg"><div class="bar-fill ${cl}" style="width:${p}%"></div></div></div>`;}).join('');
  const sr=Object.entries(ss).filter(([,v])=>v.total>0).map(([s,v])=>{const p=v.total>0?Math.round((v.correct/v.total)*100):0;return`<div class="scenario-row"><span>${SCENARIO_LABELS[parseInt(s)]}</span><span style="font-weight:700;color:${p>=75?'#388e3c':p>=60?'#f57c00':'#c62828'}">${p}% (${v.correct}/${v.total})</span></div>`;}).join('');
  const wt=Object.entries(ts).filter(([,v])=>v.total>0&&(v.correct/v.total)<0.6).sort((a,b)=>(a[1].correct/a[1].total)-(b[1].correct/b[1].total));
  const ok2=Object.entries(ts).filter(([,v])=>v.total>0&&(v.correct/v.total)>=0.6&&(v.correct/v.total)<0.8);
  const str=Object.entries(ts).filter(([,v])=>v.total>0&&(v.correct/v.total)>=0.8);
  const hm=[...wt.map(([t,v])=>`<div class="heatmap-item weak"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}%</div>`),...ok2.map(([t,v])=>`<div class="heatmap-item ok"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}%</div>`),...str.map(([t,v])=>`<div class="heatmap-item strong"><strong>${t}</strong> — ${Math.round((v.correct/v.total)*100)}%</div>`)].join('');
  const recs=wt.slice(0,5).map(([t,v])=>`<li>Review <strong>${t}</strong> (${DOMAIN_LABELS[v.domain]})</li>`).join('');
  const wrongIds=qt.filter(q=>answers[q.id]!==q.correct).map(q=>q.id);
  sc.innerHTML=`<div class="results-card"><div class="results-header"><h2>Exam Results — Mock Exam C</h2><div class="score-circle ${pass?'pass':'fail'}"><span class="score-number">${scl}</span><span class="score-label">/1000</span></div><span class="pass-fail-badge ${pass?'pass-badge':'fail-badge'}">${pass?'PASS':'FAIL'}</span><p style="color:#555;margin-top:8px">${corr}/${tot} correct (${pct}%) &bull; Passing: 720/1000</p></div></div><div class="results-card"><div class="domain-bars"><h3>Domain Performance</h3>${db}</div><div class="scenario-breakdown"><h3 style="margin-bottom:12px">Scenario Performance</h3>${sr}</div></div><div class="results-card"><h3 style="margin-bottom:12px">Task Statement Heatmap</h3><div class="heatmap-grid">${hm||'<p>No data</p>'}</div></div>${wt.length?`<div class="results-card"><div class="study-next"><h3>What To Study Next</h3><ul>${recs}</ul></div></div>`:''}<div class="results-card"><h3 style="margin-bottom:16px">Review Questions</h3>${mkReview(qt)}</div><div class="results-actions"><button class="action-btn btn-primary" onclick="location.reload()">Retake Exam</button>${wrongIds.length?`<button class="action-btn btn-secondary" onclick="retry(${JSON.stringify(wrongIds)})">Retry Incorrect (${wrongIds.length})</button>`:''}</div>`;
}
function mkReview(questions){return questions.map(q=>{const ua=answers[q.id],ok=ua===q.correct,ls=['A','B','C','D'];const opts=q.options.map((o,i)=>{let cl='option-item';if(i===q.correct)cl+=' correct-answer';if(i===ua&&!ok)cl+=' wrong-selected';return`<li class="${cl}" style="cursor:default;margin-bottom:6px"><span class="option-letter">${ls[i]})</span><div><div>${o}</div><div style="font-size:.8rem;margin-top:4px;color:${i===q.correct?'#2e7d32':'#555'}">${q.explanations[i]}</div></div></li>`;}).join('');return`<div style="margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f0f2f5"><div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:.8rem;font-weight:700;color:#0f5c2e">Q${q.id}</span><span class="q-tag tag-domain">${q.taskStatement}</span><span class="q-tag ${ok?'tag-diff-easy':'tag-diff-hard'}">${ok?'Correct':'Incorrect'}</span></div><div class="q-context">${q.context}</div><div class="q-stem">${q.stem}</div><ul class="options-list">${opts}</ul></div>`;}).join('');}
function retry(ids){retrySet=ids;retryMode=true;answers={};flagged.clear();submitted=false;document.getElementById('results-screen').style.display='none';document.getElementById('exam-ui').style.display='block';renderQ();renderNav();updProg();}
</script>
</body>
</html>
